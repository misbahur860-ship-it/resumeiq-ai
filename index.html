<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeIQ | AI Resume Analyzer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav>
        <div class="logo">ResumeIQ</div>
    </nav>

    <main>
        <section class="hero">
            <h1>Analyze your resume.</h1>
            <p>Upload your PDF or paste your text to get instant, actionable feedback tailored to your target role.</p>
        </section>

        <section class="workspace">
            <form id="resume-form" novalidate>
                <div class="form-group">
                    <label id="upload-label">Upload PDF Resume</label>
                    <div class="upload-zone" id="drop-zone" role="button" tabindex="0" aria-labelledby="upload-label">
                        <svg class="icon-upload" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                        </svg>
                        <p>Click to upload or drag and drop</p>
                        <input type="file" id="file-input" accept=".pdf" aria-hidden="true" tabindex="-1">
                        <div id="file-name" class="file-name-display" aria-live="polite"></div>
                    </div>
                </div>

                <div class="divider" aria-hidden="true">OR</div>

                <div class="form-group">
                    <label for="resume-text">Paste Resume Text</label>
                    <textarea id="resume-text" placeholder="Paste your raw resume text here..."></textarea>
                </div>

                <div class="form-group">
                    <label for="target-role">Target Role</label>
                    <div class="select-wrapper">
                        <select id="target-role" required>
                            <option value="" disabled selected>Select a role...</option>
                            <option value="frontend">Frontend Developer</option>
                            <option value="backend">Backend Developer</option>
                            <option value="fullstack">Fullstack Developer</option>
                            <option value="data">Data Scientist</option>
                            <option value="pm">Product Manager</option>
                            <option value="design">UI/UX Designer</option>
                        </select>
                    </div>
                </div>

                <div id="form-errors" class="error-message" aria-live="assertive" hidden></div>

                <button type="submit" id="analyze-btn">
                    <svg class="spinner" id="btn-spinner" viewBox="0 0 24 24" fill="none" hidden aria-hidden="true">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-dasharray="31.4 31.4"></circle>
                    </svg>
                    <span id="btn-text">Analyze Resume</span>
                </button>

                <div class="trust-badge">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                    Securely processed. We never store your data.
                </div>
            </form>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
